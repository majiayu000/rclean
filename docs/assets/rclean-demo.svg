<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">rclean scan demo</title>
  <desc id="desc">Terminal screenshot showing rclean scan output with biggest cleanup wins.</desc>
  <rect width="980" height="520" rx="10" fill="#111318"/>
  <rect x="0" y="0" width="980" height="42" rx="10" fill="#20242c"/>
  <circle cx="24" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="21" r="6" fill="#febc2e"/>
  <circle cx="64" cy="21" r="6" fill="#28c840"/>
  <text x="88" y="27" fill="#d7dce5" font-family="Menlo, Consolas, monospace" font-size="14">rclean scan ~/code --min-size 100mb</text>
  <text x="32" y="84" fill="#9aa4b2" font-family="Menlo, Consolas, monospace" font-size="18">Summary: 50 projects scanned, 51 candidates, 445 GB reclaimable</text>
  <text x="32" y="116" fill="#9aa4b2" font-family="Menlo, Consolas, monospace" font-size="18">Safety: 36 safe, 15 caution, 0 blocked</text>
  <text x="32" y="166" fill="#f0f3f7" font-family="Menlo, Consolas, monospace" font-size="19" font-weight="700">Biggest wins:</text>
  <text x="56" y="204" fill="#eef2f8" font-family="Menlo, Consolas, monospace" font-size="18">1. harness-workflow-runtime-phase2/target - 101 GB reclaimable (98.7%, caution, build)</text>
  <text x="56" y="236" fill="#eef2f8" font-family="Menlo, Consolas, monospace" font-size="18">2. harness2/target - 65 GB reclaimable (97.9%, caution, build)</text>
  <text x="56" y="268" fill="#eef2f8" font-family="Menlo, Consolas, monospace" font-size="18">3. app/node_modules - 24 GB reclaimable (92.4%, safe, deps)</text>
  <text x="56" y="300" fill="#eef2f8" font-family="Menlo, Consolas, monospace" font-size="18">4. dashboard/.next - 11 GB reclaimable (86.1%, safe, build)</text>
  <text x="56" y="332" fill="#eef2f8" font-family="Menlo, Consolas, monospace" font-size="18">5. mobile/Pods - 7.8 GB reclaimable (74.5%, safe, deps)</text>
  <text x="32" y="386" fill="#7dd3fc" font-family="Menlo, Consolas, monospace" font-size="18">Project                         Candidate        Size      Junk    Safety</text>
  <line x1="32" y1="402" x2="948" y2="402" stroke="#313846"/>
  <text x="32" y="438" fill="#d7dce5" font-family="Menlo, Consolas, monospace" font-size="18">harness-workflow-runtime-phase2  target       101 GB    98.7%   caution</text>
  <text x="32" y="470" fill="#d7dce5" font-family="Menlo, Consolas, monospace" font-size="18">app                             node_modules  24 GB    92.4%   safe</text>
</svg>
