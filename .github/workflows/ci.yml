name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: fmt, clippy, test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo fmt
        run: cargo fmt -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test

      # Exercise every supported non-default feature combination once. Default
      # behavior remains cross-platform through the Cargo test step above.
      - name: Cargo test (no default features)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --no-default-features

      - name: Cargo test (tui only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --no-default-features --features tui

      - name: Cargo test (graveyard only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --no-default-features --features graveyard

      - name: Release build
        run: cargo build --release

  # Verifies the minimum supported Rust version declared in Cargo.toml
  # (rust-version = "1.95") still actually builds and tests. Runs on
  # Ubuntu only — MSRV is a toolchain-version concern, not a
  # platform-coverage concern, so cross-platform stays in `test` above.
  msrv:
    name: MSRV build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pinned MSRV toolchain
        uses: dtolnay/rust-toolchain@1.95

      - name: Cargo build (MSRV)
        run: cargo build --all-targets --all-features

      - name: Cargo test (MSRV)
        run: cargo test
